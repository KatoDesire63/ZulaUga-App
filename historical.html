   <main>
   	<section class="hero" style="background-image: url('IMG/kampala-2376014_1280.jpg');">
   		<h1>Historical Attractions</h1>
   		<p>Step back in time and explore the rich history of Uganda.</p>
   	</section>

   	<section class="filters">
   		<button class="filter-button" onclick="scrollToSection('monuments')">Monuments</button>
   		<button class="filter-button" onclick="scrollToSection('historical-buildings')">Historical Buildings</button>
   		<button class="filter-button" onclick="scrollToSection('archaeological-sites')">Archaeological Sites</button>
   	</section>

   	<section id="monuments" class="'subcategory">
   		<h2>Monuments</h2>
   		<div class="attractions">
   			<div class="attraction">
   				<img src="">
   				<h3>Independence Monument</h3>
   				<p>
                  Erected in 1962 to commemorate Uganda's independence
                  from British rule. The monument features a man
                  unshackling himself and lifting a child, symbolizing
                  freedom and the future of Uganda.        
               </p>
   				<p class="location">
                  <strong>Location:</strong> Kampala
               </p>
   			</div>
   			<div class="attraction">
   				<img src="">
   				<h3>Sir Edward Mutesa 1 Monument</h3>
   				<p>
                  The monument commemorates Sir Edward Mutesa II,
                  the 35th Kabaka(king) of Buganda and the first
                  President of Uganda.
                  Sir Edward Mutesa II played a crucial role in Uganda's
                  struggle for independence and the subsequent political
                  developments. The statue portrays him in traditional 
                  royal regalia, symbolizing his leadership and cultural
                  significance.        
               </p>
   				<p class="location">
                  <strong>Location:</strong> On Speke road, near the Sheraton Kampala Hotel
                  and the Grand Imperial Hotel.
               </p>
   			</div>
   			<div class="attraction">
   				<img src="">
   				<h3>World War Memorial Monument</h3>
   				<p>
                  This monument is dedicated to Ugandan soldiers who
                  fought in World War 1(1914-1918) and World War II
                  (1939-1945).
                  It features an obelisk-like structure with plaques
                  and inscriptions commemorating the bravery and
                  sacrifice of these soldiers.
                  The inscriptions typically include the names of
                  soldiers. The inscriptions typically include
                  the names of soldiers and the units they
                  served in, along with dedications from
                  the people of Uganda.
               </p>
   				<p class="location">
                  <strong>Location:</strong> At the entrance of the Constitutional Square
                  in Kampala. 
               </p>
   			</div>
   			<div class="attraction">
   				<img src="">
   				<h3>Muzinga Square Park.</h3>
   				<p>
                 This canon(Muzinga) artillary was left behind by
                 Tanzanian troops during the Uganda-Tanzanian War
                 (1971-1979). After the successful overthrow of
                  Idi Amin.        
               </p>
   				<p class="location">
                  <strong>Location:</strong> Along Entebbe road. Near the State House.
               </p>
   			</div>
   		</div>
   	</section>

   	<section id="historical-buildings" class="subcategory">
   		<h2>Historical Buildings</h2>
   		<div class="attractions">
   			<div class="attraction">
   				<img src="">
   				<h3>Kabaka's Palace(Lubiri)</h3>
   				<p>
                  The official residence of the Kabaka(king)
                  of Buganda. The palace has historical
                  significance and includes structures from
                  the colonial era, as well as the infamous
                  underground torture chambers used during
                  Idi Amin's regime.        
               </p>
   				<p class="location">
                  <strong>Location:</strong> Mengo,Kampala.
               </p>
   			</div>
   			<div class="attraction">
   				<img src="">
   				<h3>Namirembe Cathedral(St.Paul's Cathedral)</h3>
   				<p>
                  The oldest cathedral in Uganda, serving as the
                  provincial cathedral of the Church of Uganda.
                  It features Gothic architectural elements
                  and offers a panoramic view of Kampala.
               </p>
   				<p class="location">
                  <strong>Location:</strong> Namirembe Hill,Kampala.
               </p>
   			</div>
   			<div class="attraction">
   				<img src="">
   				<h3>Rubaga Cathedral(St.Mary's Cathedral)</h3>
   				<p>
                  A major Catholic church and the seat of the
                  Archbishop of Kampala. Built in the early
                  20th cenury, it has twin spires and 
                  beautiful stained glass windows.
               </p>
   				<p class="location">
                  <strong>Location:</strong> Rubaga Hill, Kampala.
               </p>
   			</div>
   			<div class="attraction">
   				<img src="">
   				<h3>Old Kampala Mosque(Uganda National Mosque)</h3>
   				<p>
                  Also known as the Gaddafi National Mosque, this
                  is one of the largest mosques in Africa. It was funded
                  by the Late Libyan President Muammar Gaddafi and features
                  a large minaret with panoramic views of the city.
               </p>
   				<p class="location">
                  <strong>Location:</strong>Old Kampala Hill,Kampala.
               </p>
   			</div>
            <div class="attraction">
               <img src="">
               <h3>Mengo Hospital</h3>
               <p>
                  Founded in 1897 by Sir Albert Cook, it is one of the oldest
                  hospitals in Uganda. The hospital has a rich history and
                  continues to be a major healthcare institution.
               </p>
               <p class="location">
                  <strong>Location:</strong>Mengo,Kampala
               </p>
            </div>
            <div class="attraction">
               <img src="">
               <h3>Makerere University Main Building</h3>
               <p>
                  Makerere University, was established in 1922, is one
                  of Africa's oldest and most prestigious universities.
                  The main building, with its iconic clock tower, is a
                  symbol of higher education in Uganda.
               </p>
               <p class="location">
                  <strong>Location:</strong>Makerere Hill,Kampala.
               </p>
            </div>
   		</div>
   	</section>

   	
    <section id="archaeological-sites" class="subcategory">
   		<h2>Archaeological Sites</h2>
   		<div class="attractions">
   			<div class="attraction">
   				<img src="">
   				<h3>Nyero Rock Paintings</h3>
   				<p>
                   These rock paintings are estimated to be around 3,000
                   years old and depict various geometric patterns,
                   animals, and human figures.
                   They provide insight into the artistic and cultural
                   practices of early inhabitants of the region.
               </p>
   				<p class="location">
                  <strong>Location:</strong>Found in Kumi district.
               </p>
   			</div>
   			<div class="attraction">
   				<img src="">
   				<h3>Bigo Bya Mugenyi</h3>
   				<p>
                  This site contains massive, ancient earthworks believed to
                  have been built around 1000 AD. It's thought to have served
                  as a royal palace for local kings.
               </p>
   				<p class="location">
                  <strong>Location: Found near Mubende.</strong>
               </p>
   			</div>
   			<div class="attraction">
   				<img src="">
   				<h3>Nsongezi Rock Shelter:</h3>
   				<p>
                 This rock shelter contains evidence of human occupation
                 dating back over 50,000 years, making it one of the
                 oldest sites of human habitation in East Africa. 
               </p>
   				<p class="location">
                  <strong>Location:</strong>Situated near Lake Edward.
               </p>
   			</div>
   			<div class="attraction">
   				<img src="">
   				<h3>Engaruka</h3>
   				<p>
                 This site features extensive ruins of an ancient settlement
                 believed to have been inhabited between the 15th & 17th
                 centuries. The site includes stone terraces, irrigation
                 channels, and residential structures.        
               </p>
   				<p class="location">
                  <strong>Location:</strong> Near the border with Tanzania.
               </p>
   			</div>
            <div class="attraction">
               <img src="">
               <h3>Munsa Earthworks</h3>
               <p>
                  These earthworks consist of a series of terraces and stone
                  structures thought to have been constrcuted by the
                  Bachwezi peolpe around 1000 AD. The purpose of these
                  earthworks is still debated maong archaeologists.
               </p>
               <p class="location">Location:Situated in the Kigezi region.</p>
            </div>
            <div class="attraction">
               <img src="">
               <h3>Ntusi</h3>
               <p>
                  Thsi site features a complex of ancient iron smelting
                  furnaces. It provides insight into early ironworking 
                  in the region.
               </p>
               <p class="location">
                   <strong>Location:</strong> Sembabule district.
               </p>
            </div>
   		</div>
   	</section>
